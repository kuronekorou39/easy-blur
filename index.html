<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Blur - モザイクツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="app-title">Easy Blur</h1>
        </div>
        <div class="header-center">
            <button id="undoBtn" class="header-btn" disabled title="元に戻す (Ctrl+Z)">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 10h10a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H9"/>
                    <path d="M7 14l-4-4 4-4"/>
                </svg>
                <span>元に戻す</span>
            </button>
            <button id="redoBtn" class="header-btn" disabled title="やり直し (Ctrl+Y)">
                <span>やり直し</span>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10H11a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h4"/>
                    <path d="M17 14l4-4-4-4"/>
                </svg>
            </button>
        </div>
        <div class="header-right">
            <button id="saveBtn" class="header-btn btn-primary" disabled title="保存 (Ctrl+S)">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                <span>PNG保存</span>
            </button>
        </div>
    </header>

    <div class="app-body">
        <aside class="toolbar">
            <div class="tool-section">
                <div class="tool-section-title">ツール</div>
                <div class="mode-toggle">
                    <button id="brushModeBtn" class="mode-btn active" title="ブラシモード (B)">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span>ブラシ</span>
                    </button>
                    <button id="rectModeBtn" class="mode-btn" title="矩形選択モード (R)">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="1" stroke-dasharray="4 2"/>
                        </svg>
                        <span>矩形</span>
                    </button>
                </div>
            </div>

            <div class="tool-section">
                <div class="tool-section-title">モザイク強度</div>
                <div class="slider-group">
                    <input type="range" id="blockSizeSlider" min="3" max="60" value="15" class="slider">
                    <span id="blockSizeValue" class="slider-value">15</span>
                </div>
            </div>

            <div class="tool-section" id="brushSizeSection">
                <div class="tool-section-title">ブラシサイズ</div>
                <div class="slider-group">
                    <input type="range" id="brushSizeSlider" min="5" max="150" value="30" class="slider">
                    <span id="brushSizeValue" class="slider-value">30</span>
                </div>
            </div>

            <div class="tool-section">
                <button id="clearAllBtn" class="tool-btn btn-danger" disabled title="すべてクリア">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    <span>モザイクをクリア</span>
                </button>
            </div>

            <div class="tool-section shortcut-hints">
                <div class="tool-section-title">ショートカット</div>
                <div class="shortcut-row"><kbd>B</kbd> ブラシ</div>
                <div class="shortcut-row"><kbd>R</kbd> 矩形</div>
                <div class="shortcut-row"><kbd>Ctrl+Z</kbd> 元に戻す</div>
                <div class="shortcut-row"><kbd>Ctrl+Y</kbd> やり直し</div>
                <div class="shortcut-row"><kbd>Ctrl+S</kbd> 保存</div>
                <div class="shortcut-row"><kbd>[</kbd><kbd>]</kbd> ブラシサイズ</div>
            </div>
        </aside>

        <main class="canvas-area">
            <div id="canvasContainer" class="canvas-container">
                <div id="dropZone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p class="drop-zone-text">画像をドラッグ&ドロップ</p>
                        <p class="drop-zone-subtext">または</p>
                        <button id="fileSelectBtn" class="file-select-btn">ファイルを選択</button>
                        <p class="drop-zone-hint">PNG, JPG, WebP, BMP に対応</p>
                    </div>
                </div>
                <canvas id="displayCanvas" class="display-canvas" style="display:none;"></canvas>
                <div id="cursorOverlay" class="cursor-overlay" style="display:none;"></div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </main>
    </div>

    <footer class="status-bar">
        <span id="statusInfo">画像を読み込んでください</span>
        <span id="zoomInfo"></span>
    </footer>

    <div id="processingOverlay" class="processing-overlay" style="display:none;">
        <div class="processing-content">
            <div class="spinner"></div>
            <p>処理中...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
